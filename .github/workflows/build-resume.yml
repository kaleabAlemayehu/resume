name: Build Resume PDF

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          texlive_version: latest

      - name: Rename PDF to Kaleab_Alemayehu_Resume.pdf
        run: mv resume.pdf Kaleab_Alemayehu_Resume.pdf

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: Kaleab_Alemayehu_Resume.pdf
          retention-days: 30

      - name: Commit and push PDF
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Check if PDF exists and is different from what's in git
          if [ -f Kaleab_Alemayehu_Resume.pdf ]; then
            git add Kaleab_Alemayehu_Resume.pdf
            git diff --cached --quiet || git commit -m "chore: update resume PDF [skip ci]"
            git push
          else
            echo "Kaleab_Alemayehu_Resume.pdf not found"
            exit 1
          fi
