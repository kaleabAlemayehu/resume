name: Build Resume PDF

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: resume.tex
          texlive_version: latest

      - name: Generate artifact name
        id: artifact
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [ "$BRANCH_NAME" = "master" ]; then
            echo "name=resume" >> $GITHUB_OUTPUT
            echo "pdf-name=Kaleab_Alemayehu_Resume.pdf" >> $GITHUB_OUTPUT
          else
            echo "name=resume-${BRANCH_NAME}" >> $GITHUB_OUTPUT
            echo "pdf-name=Kaleab_Alemayehu_Resume_${BRANCH_NAME}.pdf" >> $GITHUB_OUTPUT
          fi

      - name: Rename PDF
        run: mv resume.pdf "${{ steps.artifact.outputs.pdf-name }}"

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.pdf-name }}
          retention-days: 90

      - name: Commit and push PDF
        if: github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          PDF_FILE="${{ steps.artifact.outputs.pdf-name }}"
          if [ -f "$PDF_FILE" ]; then
            git add "$PDF_FILE"
            git diff --cached --quiet || git commit -m "chore: update resume PDF [skip ci]"
            git push
          else
            echo "$PDF_FILE not found"
            exit 1
          fi
